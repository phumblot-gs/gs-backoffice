name: Promote to Staging on Evolution Merge

# When a self-evolution PR is merged to main (the human's validation gate), promote
# main → staging so Paperclip continues the loop into a staging deployment without a
# manual step. Scoped to evolution PRs so ordinary merges don't auto-deploy:
#   - the Methods Officer's branches (methods-officer/*), or
#   - any PR explicitly labelled `deploy:staging`.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write # push to the staging branch
  actions: write # dispatch the Deploy Staging workflow

jobs:
  promote:
    name: Promote main → staging
    runs-on: ubuntu-latest
    # Only on a real merge (not a closed-without-merge), and only for evolution PRs.
    if: >-
      github.event.pull_request.merged == true &&
      ( startsWith(github.event.pull_request.head.ref, 'methods-officer/') ||
        contains(github.event.pull_request.labels.*.name, 'deploy:staging') )
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout staging
          git merge --no-edit origin/main
          git push origin staging

      # Audit (SOC2): record the human go-live decision (the PR merge) in the backoffice
      # trail — it otherwise lives only in GitHub. Best-effort; never fails the promotion.
      - name: Emit backoffice.evolution.merged
        env:
          EVT_API_URL: ${{ secrets.EVT_API_URL }}
          EVT_API_KEY: ${{ secrets.EVT_API_KEY }}
          EVT_ACCOUNT_ID: ${{ secrets.EVT_ACCOUNT_ID }}
          EVT_EVENT_TYPE: backoffice.evolution.merged
          EVT_RESOURCE_TYPE: evolution
          EVT_RESOURCE_ID: ${{ github.event.pull_request.merge_commit_sha }}
          EVT_ACTOR: ${{ github.event.pull_request.merged_by.login }}
          EVT_PAYLOAD: '{"prNumber":${{ github.event.pull_request.number }},"url":"${{ github.event.pull_request.html_url }}","branch":"${{ github.event.pull_request.head.ref }}","baseRef":"main","mergedBy":"${{ github.event.pull_request.merged_by.login }}","sha":"${{ github.event.pull_request.merge_commit_sha }}"}'
        run: node scripts/emit-evt.mjs

      # A push made with GITHUB_TOKEN does NOT re-trigger workflows, so trigger the
      # staging deploy explicitly on the freshly-updated staging branch.
      - name: Trigger Deploy Staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-staging.yml --ref staging

      - name: Summary
        run: |
          echo "Promoted main → staging after merging PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.ref }})." >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy Staging dispatched on the staging branch." >> "$GITHUB_STEP_SUMMARY"
